name: JustDoThree

options:
  bundleIdPrefix: com.todd
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"

schemes:
  JustDoThree:
    build:
      targets:
        JustDoThree: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  JustDoThree:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustDoThree
    info:
      path: JustDoThree/Info.plist
      properties:
        CFBundleDisplayName: Just Do Three
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationUsageDescription: "Just Do Three uses notifications to send optional morning and evening reminders."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todd.justdothree
        DEVELOPMENT_TEAM: 3ZAS78KQUH
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: JustDoThree/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEAD_CODE_STRIPPING: YES
